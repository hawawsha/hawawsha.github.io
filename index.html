<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سوق هوواشة v2 - دفع Pi</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    h2 { color: #fff; font-size: 1.8rem; margin-bottom: 8px; }
    .subtitle { color: rgba(255,255,255,0.6); font-size: 0.95rem; margin-bottom: 30px; }

    .amount-box {
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .amount-label { color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-bottom: 6px; }
    .amount-value { color: #a855f7; font-size: 2.5rem; font-weight: 800; }
    .amount-currency { color: rgba(255,255,255,0.7); font-size: 1rem; margin-top: 4px; }

    #payBtn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white; border: none; border-radius: 14px;
      font-size: 1.1rem; font-weight: 700;
      cursor: pointer; transition: all 0.3s ease;
      margin-bottom: 16px; font-family: inherit;
    }

    #payBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(124,58,237,0.5);
    }

    #payBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      padding: 14px; border-radius: 12px;
      font-size: 0.9rem; font-weight: 500;
      transition: all 0.3s ease; min-height: 48px;
      display: flex; align-items: center; justify-content: center;
    }

    .status-ready   { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); }
    .status-loading { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
    .status-success { background: rgba(34,197,94,0.15);  color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .status-error   { background: rgba(239,68,68,0.15);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .status-cancel  { background: rgba(156,163,175,0.15);color: #9ca3af; border: 1px solid rgba(156,163,175,0.3); }

    .user-info {
      background: rgba(255,255,255,0.05);
      border-radius: 12px; padding: 12px 16px;
      margin-bottom: 20px; color: rgba(255,255,255,0.7);
      font-size: 0.85rem; display: none;
    }
    .user-info.visible { display: block; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 8px; vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer { margin-top: 24px; color: rgba(255,255,255,0.3); font-size: 0.75rem; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">🛒</div>
  <h2>سوق هوواشة</h2>
  <p class="subtitle">منصة التسوق بعملة Pi</p>

  <div class="user-info" id="userInfo"></div>

  <div class="amount-box">
    <div class="amount-label">المبلغ المطلوب</div>
    <div class="amount-value">1</div>
    <div class="amount-currency">Pi Network</div>
  </div>

  <button id="payBtn">ادفع 1 Pi</button>
  <div id="status" class="status-ready">جاهز للدفع..</div>

  <div class="footer">مدعوم بشبكة Pi Network · Mainnet</div>
</div>

<script>
  // ============================
  // تهيئة Pi SDK على Mainnet
  // ============================
  Pi.init({ version: "2.0", sandbox: false });

  const statusEl = document.getElementById("status");
  const payBtn   = document.getElementById("payBtn");
  const userInfoEl = document.getElementById("userInfo");

  function setStatus(message, type = "ready") {
    statusEl.className = `status-${type}`;
    statusEl.innerHTML = message;
  }

  // ============================
  // معالجة الدفعات غير المكتملة
  // ============================
  function onIncompletePaymentFound(payment) {
    console.log("دفعة غير مكتملة:", payment);
    fetch("/api/payment/complete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ paymentId: payment.identifier })
    }).catch(err => console.error("خطأ في إكمال الدفعة:", err));
  }

  // ============================
  // مصادقة المستخدم عند التحميل
  // ============================
  async function authenticateUser() {
    try {
      setStatus("جاري تسجيل الدخول.. <span class='spinner'></span>", "loading");
      payBtn.disabled = true;

      const authResult = await Pi.authenticate(
        ["payments", "username"],
        onIncompletePaymentFound
      );

      userInfoEl.textContent = `مرحباً، ${authResult.user.username} 👋`;
      userInfoEl.classList.add("visible");
      setStatus("تم تسجيل الدخول بنجاح ✓", "success");
      payBtn.disabled = false;

    } catch (err) {
      setStatus("فشل تسجيل الدخول: " + (err.message || "خطأ غير معروف"), "error");
      payBtn.disabled = false;
    }
  }

  // ============================
  // عملية الدفع الرئيسية
  // ============================
  document.getElementById("payBtn").onclick = async () => {
    payBtn.disabled = true;
    setStatus("جاري إنشاء الدفعة.. <span class='spinner'></span>", "loading");

    const orderId = "order_" + Date.now();

    try {
      await Pi.createPayment(
        {
          amount: 1,
          memo: "سوق هوواشة - طلب رقم " + orderId,
          metadata: { orderId, product: "سوق هوواشة v2" }
        },
        {
          // خطوة 1: موافقة السيرفر
          onReadyForServerApproval: async (paymentId) => {
            setStatus("جاري الموافقة.. <span class='spinner'></span>", "loading");
            try {
              await fetch("/api/payment/approve", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentId, orderId })
              });
            } catch (err) {
              console.error("خطأ في الموافقة:", err);
            }
          },

          // خطوة 2: إكمال الدفعة
          onReadyForServerCompletion: async (paymentId, txid) => {
            setStatus("جاري تأكيد الدفعة.. <span class='spinner'></span>", "loading");
            try {
              const res = await fetch("/api/payment/complete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentId, txid, orderId })
              });
              if (res.ok) {
                setStatus("✅ تم الدفع بنجاح! شكراً لك", "success");
              } else {
                setStatus("⚠️ تم الدفع لكن حدث خطأ في السيرفر", "error");
              }
            } catch (err) {
              setStatus("⚠️ تم الدفع لكن تعذر التأكيد", "error");
            }
          },

          onCancel: (paymentId) => {
            setStatus("❌ تم إلغاء الدفعة", "cancel");
            payBtn.disabled = false;
          },

          onError: (error) => {
            setStatus("❌ خطأ: " + (error.message || "خطأ غير متوقع"), "error");
            payBtn.disabled = false;
          }
        }
      );

    } catch (err) {
      setStatus("❌ خطأ: " + (err.message || "خطأ غير متوقع"), "error");
      payBtn.disabled = false;
    }
  };

  // بدء المصادقة عند تحميل الصفحة
  window.addEventListener("load", authenticateUser);
</script>

</body>
</html>
